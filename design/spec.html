<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "width": "default",
  "toc": "on"
}/*EDITMODE-END*/;

// ── Spec index (same ordering as landing) ────────────────────
const SECTIONS = {
  bolt:    "Bolt Specifications",
  nut:     "Nut Specifications",
  washer:  "Washer Specifications",
  thread:  "Thread Standards",
  coating: "Coatings & Finishes",
  metric:  "Metric Reference",
};

const SPECS = [
  {code:"ASTM A193",    file:"astm-a193",    section:"bolt",    title:"High-temp/high-pressure alloy & stainless bolting"},
  {code:"ASTM A307",    file:"astm-a307",    section:"bolt",    title:"General-purpose carbon steel bolts"},
  {code:"ASTM A320",    file:"astm-a320",    section:"bolt",    title:"Low-temperature alloy & stainless bolting"},
  {code:"ASTM A354",    file:"astm-a354",    section:"bolt",    title:"Quenched & tempered alloy bolts"},
  {code:"ASTM A449",    file:"astm-a449",    section:"bolt",    title:"Heat-treated bolts"},
  {code:"ASTM A453",    file:"astm-a453",    section:"bolt",    title:"High-temperature superalloy bolting (A286)"},
  {code:"ASTM A540",    file:"astm-a540",    section:"bolt",    title:"Heavy-duty turbine-grade alloy bolting"},
  {code:"ASTM A574",    file:"astm-a574",    section:"bolt",    title:"Alloy steel socket head cap screws"},
  {code:"ASTM F593",    file:"astm-f593",    section:"bolt",    title:"Stainless steel bolts, hex cap screws, studs"},
  {code:"ASTM F1554",   file:"astm-f1554",   section:"bolt",    title:"Anchor bolts — Gr 36, 55, 105"},
  {code:"ASTM F3125",   file:"astm-f3125",   section:"bolt",    title:"Structural bolts (A325, A490, F1852, F2280, 144)"},
  {code:"SAE J429",     file:"sae-j429",     section:"bolt",    title:"SAE inch bolt grades"},
  {code:"ASTM A194",    file:"astm-a194",    section:"nut",     title:"High-temp/high-pressure nuts"},
  {code:"ASTM A563",    file:"astm-a563",    section:"nut",     title:"Structural and general nuts"},
  {code:"ASTM F467",    file:"astm-f467",    section:"nut",     title:"Nonferrous nuts"},
  {code:"ASTM F594",    file:"astm-f594",    section:"nut",     title:"Stainless steel nuts"},
  {code:"SAE J995",     file:"sae-j995",     section:"nut",     title:"SAE inch nut grades"},
  {code:"ASTM F436",    file:"astm-f436",    section:"washer",  title:"Hardened structural washers"},
  {code:"ASTM F844",    file:"astm-f844",    section:"washer",  title:"Plain unhardened flat washers"},
  {code:"ASTM F959",    file:"astm-f959",    section:"washer",  title:"Direct tension indicators (DTIs)"},
  {code:"ASME B1.1",    file:"asme-b1-1",    section:"thread",  title:"Unified inch screw threads"},
  {code:"ASME B1.13M",  file:"asme-b1-13m",  section:"thread",  title:"Metric screw threads (M profile)"},
  {code:"ASME B1.20.1", file:"asme-b1-20-1", section:"thread",  title:"NPT pipe threads"},
  {code:"Thread Fit Classes", file:"thread-fit-classes", section:"thread", title:"1A/1B, 2A/2B, 3A/3B reference"},
  {code:"ASTM F2329",   file:"astm-f2329",   section:"coating", title:"Hot-dip galvanizing"},
  {code:"ASTM F1941",   file:"astm-f1941",   section:"coating", title:"Zinc electroplating"},
  {code:"ASTM B695",    file:"astm-b695",    section:"coating", title:"Mechanical galvanizing"},
  {code:"Zinc-Flake",   file:"zinc-flake-coatings", section:"coating", title:"F3019 / F1136 / F2833 systems"},
  {code:"Xylan",        file:"xylan-fluoropolymer-coatings", section:"coating", title:"Xylan & fluoropolymer coatings"},
  {code:"Cadmium",      file:"cadmium-plating", section:"coating", title:"QQ-P-416 legacy reference"},
  {code:"ASTM F568M",   file:"astm-f568m",   section:"metric",  title:"Metric property classes (ISO 898-1)"},
];

// Map filename -> spec index entry (for cross-link resolution)
const SPEC_BY_FILE = {};
SPECS.forEach(s => SPEC_BY_FILE[s.file] = s);

// Fuzzy resolver: given a code like "A194" or "F593" or "F3125", find a spec file
function resolveCrossLink(text) {
  const t = text.trim().toLowerCase().replace(/[\s\u2011\u2013\u2014\-]/g, '');
  for (const s of SPECS) {
    const code = s.code.toLowerCase().replace(/[\s\u2011\u2013\u2014\-]/g, '').replace(/\.md$/, '');
    if (code === t || code.endsWith(t) || code.includes(t)) return s;
  }
  return null;
}

// ── Minimal markdown renderer ─────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function inline(s) {
  // escape first
  s = escHtml(s);
  // code spans
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // italic
  s = s.replace(/(^|[^\*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // em dashes and special chars already in md
  return s;
}

function renderMarkdown(md) {
  // Normalize
  md = md.replace(/\r\n/g, '\n');
  const lines = md.split('\n');
  let out = [];
  let i = 0;
  let h1Title = '';

  while (i < lines.length) {
    let line = lines[i];

    // H1
    if (/^# /.test(line)) {
      h1Title = line.replace(/^# /, '').trim();
      i++;
      continue;
    }
    // H2
    if (/^## /.test(line)) {
      const title = line.replace(/^## /, '').trim();
      const slug = title.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
      out.push(`<h2 id="${slug}">${inline(title)}</h2>`);
      i++;
      continue;
    }
    // H3
    if (/^### /.test(line)) {
      const title = line.replace(/^### /, '').trim();
      out.push(`<h3>${inline(title)}</h3>`);
      i++;
      continue;
    }
    // HR
    if (/^---+\s*$/.test(line)) {
      out.push('<hr>');
      i++;
      continue;
    }
    // Blockquote block
    if (/^> /.test(line)) {
      const bq = [];
      while (i < lines.length && /^> ?/.test(lines[i])) {
        bq.push(lines[i].replace(/^> ?/, ''));
        i++;
      }
      out.push('<blockquote>' + renderMarkdown(bq.join('\n')) + '</blockquote>');
      continue;
    }
    // Table
    if (/^\|.*\|\s*$/.test(line) && i+1 < lines.length && /^\|[\s\-|:]+\|\s*$/.test(lines[i+1])) {
      const header = lines[i].split('|').slice(1,-1).map(c => c.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\|.*\|\s*$/.test(lines[i])) {
        rows.push(lines[i].split('|').slice(1,-1).map(c => c.trim()));
        i++;
      }
      let html = '<table><thead><tr>' + header.map(h => `<th>${inline(h)}</th>`).join('') + '</tr></thead><tbody>';
      for (const r of rows) {
        html += '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>';
      }
      html += '</tbody></table>';
      out.push(html);
      continue;
    }
    // UL / OL
    if (/^[\-\*] /.test(line) || /^\d+\. /.test(line)) {
      const ordered = /^\d+\. /.test(line);
      const tag = ordered ? 'ol' : 'ul';
      const items = [];
      while (i < lines.length && (ordered ? /^\d+\. /.test(lines[i]) : /^[\-\*] /.test(lines[i]))) {
        let item = lines[i].replace(ordered ? /^\d+\. / : /^[\-\*] /, '');
        i++;
        // multi-line continuation (indented)
        while (i < lines.length && /^  +/.test(lines[i])) {
          item += ' ' + lines[i].trim();
          i++;
        }
        items.push(`<li>${inline(item)}</li>`);
      }
      out.push(`<${tag}>${items.join('')}</${tag}>`);
      continue;
    }
    // Blank line
    if (!line.trim()) { i++; continue; }
    // Paragraph (gather until blank)
    const para = [line];
    i++;
    while (i < lines.length && lines[i].trim() && !/^[#>\-\*\|]|^\d+\. /.test(lines[i]) && !/^---+/.test(lines[i])) {
      para.push(lines[i]);
      i++;
    }
    out.push(`<p>${inline(para.join(' '))}</p>`);
  }
  return out.join('\n');
}

// ── Extract pieces from markdown ──────────────────────────────
function parseSpec(md) {
  const lines = md.split('\n');
  const result = { h1: '', glance: '', meta: {}, bodyMd: '', related: [] };

  // H1
  const h1Line = lines.find(l => /^# /.test(l));
  if (h1Line) result.h1 = h1Line.replace(/^# /, '').trim();

  // Blockquote at top — At a glance
  let glanceStart = lines.findIndex(l => /^> \*\*At a glance/i.test(l));
  if (glanceStart >= 0) {
    const glance = [];
    let j = glanceStart;
    while (j < lines.length && /^> ?/.test(lines[j])) {
      glance.push(lines[j].replace(/^> ?/, ''));
      j++;
    }
    result.glance = glance.join(' ').replace(/\*\*At a glance:\*\*\s*/i, '').trim();
  }

  // Meta lines: **Category:** ...
  const metaRegex = /^\*\*(.+?):\*\*\s*(.+)$/;
  for (const l of lines) {
    const m = l.match(metaRegex);
    if (m && ['Category','Common grades stocked','Common groups stocked','Typical pairing','Industries','Applies to','Typical base fasteners'].includes(m[1])) {
      result.meta[m[1]] = m[2];
    }
  }

  // Build body markdown: skip H1, top blockquote, meta lines, and first --- separator
  const bodyLines = [];
  let skipTopBlockquote = glanceStart >= 0;
  let skippedFirstHr = false;
  for (let k = 0; k < lines.length; k++) {
    const l = lines[k];
    if (/^# /.test(l)) continue;
    if (skipTopBlockquote && /^> ?/.test(l)) continue;
    if (skipTopBlockquote && !/^> ?/.test(l) && l.trim() !== '') skipTopBlockquote = false;
    if (metaRegex.test(l) && ['Category','Common grades stocked','Common groups stocked','Typical pairing','Industries','Applies to','Typical base fasteners'].includes(l.match(metaRegex)[1])) continue;
    if (!skippedFirstHr && /^---+\s*$/.test(l)) { skippedFirstHr = true; continue; }
    bodyLines.push(l);
  }
  result.bodyMd = bodyLines.join('\n').trim();

  // Related specs — scan "## Related specifications" block
  const relIdx = lines.findIndex(l => /^##\s+Related/i.test(l));
  if (relIdx >= 0) {
    for (let k = relIdx+1; k < lines.length; k++) {
      if (/^##\s/.test(lines[k])) break;
      const m = lines[k].match(/\*\*([^*]+)\*\*\s*[—\-]\s*(.+)/);
      if (m) {
        const resolved = resolveCrossLink(m[1]);
        if (resolved) result.related.push({code: m[1].trim(), desc: m[2].trim().replace(/\(.*?\)/g,'').trim(), file: resolved.file});
      }
    }
  }
  return result;
}

// ── Build TOC from H2s in rendered body ───────────────────────
function buildToc(html) {
  const re = /<h2 id="([^"]+)">([^<]+)<\/h2>/g;
  const items = [];
  let m;
  while ((m = re.exec(html)) !== null) {
    items.push({id: m[1], text: m[2]});
  }
  return items;
}

// ── Render page ───────────────────────────────────────────────
async function loadSpec(file) {
  const spec = SPEC_BY_FILE[file];
  if (!spec) {
    document.getElementById('mainContent').innerHTML = `
      <div class="sp-loading" style="text-align:left;text-transform:none;letter-spacing:0;font-family:inherit;font-size:17px;">
        <p>Spec not found: <code>${escHtml(file)}</code></p>
        <p><a href="technical-library.html" style="color:var(--blue-dark);">← Back to Technical Library</a></p>
      </div>`;
    return;
  }

  let md;
  try {
    const res = await fetch(`assets/technical-library/${file}.md`);
    if (!res.ok) throw new Error('Fetch failed');
    md = await res.text();
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="sp-loading" style="text-align:left;text-transform:none;letter-spacing:0;font-family:inherit;font-size:17px;">
        <p>Couldn't load <code>${file}.md</code>. This page needs to be served over http:// (not opened from disk).</p>
      </div>`;
    return;
  }

  const parsed = parseSpec(md);
  document.title = `${parsed.h1} — California Fastener`;
  document.getElementById('crumbCurrent').textContent = spec.code;
  document.getElementById('crumbSection').textContent = SECTIONS[spec.section];

  // Render body
  let bodyHtml = renderMarkdown(parsed.bodyMd);
  // Turn code references in body (A193, F3125, etc.) into links -- lightly, to avoid overlinking
  // Only convert ones that aren't already in an anchor tag
  bodyHtml = bodyHtml.replace(/(?<!["=>\/])\b(ASTM\s+[AFB]\d+[A-Z]?|SAE\s+J\d+|ASME\s+B1\.\d+(?:\.\d+)?M?)\b/g, (match) => {
    const target = resolveCrossLink(match);
    if (target && target.file !== file) {
      return `<a href="spec.html?s=${target.file}">${match}</a>`;
    }
    return match;
  });

  // Build toc
  const toc = buildToc(bodyHtml);

  // Meta rows
  const metaKeys = ['Category','Common grades stocked','Common groups stocked','Typical pairing','Industries','Applies to','Typical base fasteners'];
  const metaHtml = metaKeys.filter(k => parsed.meta[k]).map(k => `
    <div class="sp-meta-row">
      <span class="sp-meta-k">${k.replace('Common grades stocked','Grades stocked').replace('Common groups stocked','Groups stocked').replace('Typical base fasteners','Typical base')}</span>
      <span class="sp-meta-v">${inline(parsed.meta[k])}</span>
    </div>
  `).join('');

  // Prev/next in section
  const sectionSpecs = SPECS.filter(s => s.section === spec.section);
  const myIdx = sectionSpecs.findIndex(s => s.file === spec.file);
  const prev = myIdx > 0 ? sectionSpecs[myIdx-1] : null;
  const next = myIdx < sectionSpecs.length-1 ? sectionSpecs[myIdx+1] : null;

  // Related
  let relatedHtml = '';
  if (parsed.related.length) {
    relatedHtml = `
      <div class="sp-footer-band">
        <div class="sp-related-title">Cross-references</div>
        <div class="sp-related-grid">
          ${parsed.related.slice(0, 6).map(r => `
            <a class="sp-related-card" href="spec.html?s=${r.file}">
              <b>${escHtml(r.code)}</b>
              <span>${inline(r.desc)}</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

  // Assemble
  document.getElementById('mainContent').innerHTML = `
    <header class="sp-hero">
      <div>
        <span class="sp-tag">${SECTIONS[spec.section]}</span>
        <div class="sp-code">${escHtml(spec.code)}</div>
        <div class="sp-name">${escHtml(parsed.h1.replace(/^[^\—\-]+[\—\-]\s*/, ''))}</div>
      </div>
      ${metaHtml ? `<div class="sp-meta">${metaHtml}</div>` : ''}
    </header>

    ${parsed.glance ? `<div class="sp-glance">${inline(parsed.glance)}</div>` : ''}

    <div class="sp-body-wrap">
      <aside class="sp-toc">
        <div class="sp-toc-title">On this page</div>
        <ul class="sp-toc-list">
          ${toc.map(t => `<li><a href="#${t.id}" data-toc="${t.id}">${escHtml(t.text)}</a></li>`).join('')}
        </ul>
      </aside>
      <article class="sp-body">
        ${bodyHtml}
        ${relatedHtml}
        <div class="sp-nav">
          <a class="sp-nav-link sp-nav-prev ${prev ? '' : 'is-disabled'}" href="${prev ? `spec.html?s=${prev.file}` : '#'}">
            <span>← Previous</span>
            <b>${prev ? prev.code : '—'}</b>
          </a>
          <a class="sp-nav-link sp-nav-next ${next ? '' : 'is-disabled'}" href="${next ? `spec.html?s=${next.file}` : '#'}">
            <span>Next →</span>
            <b>${next ? next.code : '—'}</b>
          </a>
        </div>
      </article>
    </div>
  `;

  // TOC scroll-spy
  const tocLinks = document.querySelectorAll('[data-toc]');
  const tocTargets = toc.map(t => document.getElementById(t.id)).filter(Boolean);
  function updateToc() {
    let activeId = null;
    for (const el of tocTargets) {
      const r = el.getBoundingClientRect();
      if (r.top < 140) activeId = el.id;
      else break;
    }
    tocLinks.forEach(a => a.classList.toggle('is-active', a.dataset.toc === activeId));
  }
  window.addEventListener('scroll', updateToc, {passive: true});
  updateToc();
}

// Quote band at end
function renderQuoteBand() {
  const band = document.createElement('section');
  band.className = 'sp-quote-band';
  band.id = 'quote';
  band.innerHTML = `
    <div class="sp-wrap">
      <div class="sp-quote-inner">
        <div>
          <div class="sp-quote-head">Need this spec quoted?</div>
          <div class="sp-quote-sub">California Fastener stocks every specification in this library. Send a drawing, BOM, or part number and we'll come back with pricing, lead time, and a mill-cert plan.</div>
        </div>
        <div class="sp-quote-actions">
          <a href="#" class="sp-btn-primary">
            Request a Quote
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
          </a>
          <a href="mailto:info@californiafastener.com" class="sp-quote-email">info@californiafastener.com</a>
        </div>
      </div>
    </div>
  `;
  document.querySelector('footer.cf-footer').before(band);
}

// ── Tweaks ──────────────────────────────────────────────────
const tweaks = {...TWEAK_DEFAULTS};
function applyTweaks() {
  document.body.classList.toggle('sp-width-wide', tweaks.width === 'wide');
  document.body.classList.toggle('sp-width-narrow', tweaks.width === 'narrow');
  document.body.classList.toggle('sp-toc-hidden', tweaks.toc === 'off');
  document.querySelectorAll('[data-tweak]').forEach(g => {
    const key = g.dataset.tweak;
    g.querySelectorAll('.sp-tweaks-opt').forEach(b => b.classList.toggle('is-active', b.dataset.val === tweaks[key]));
  });
}
document.getElementById('tweaks').addEventListener('click', e => {
  const btn = e.target.closest('.sp-tweaks-opt');
  if (!btn) return;
  const key = btn.closest('[data-tweak]').dataset.tweak;
  tweaks[key] = btn.dataset.val;
  applyTweaks();
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: {[key]: tweaks[key]}}, '*');
});
window.addEventListener('message', e => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('is-visible');
  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('is-visible');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');

// ── Init ─────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const specFile = params.get('s') || 'astm-f3125'; // default showcase
applyTweaks();
renderQuoteBand();
loadSpec(specFile);
</script>
